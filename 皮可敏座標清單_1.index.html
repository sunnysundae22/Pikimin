<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🌸 皮可敏座標清單</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f8f4ff; min-height: 100vh; padding: 16px; }
  h1 { text-align: center; font-size: 22px; color: #6b21a8; margin-bottom: 6px; }
  .subtitle { text-align: center; font-size: 13px; color: #a78bfa; margin-bottom: 20px; }

  .stats { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: white; border-radius: 12px; padding: 10px 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .stat .num { font-size: 22px; font-weight: bold; }
  .stat .lbl { font-size: 12px; color: #9ca3af; }
  .stat.mush .num { color: #b45309; }
  .stat.flower .num { color: #be185d; }
  .stat.total .num { color: #6b21a8; }

  .filter-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { border: none; border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { color: white; }
  .filter-btn.all { background: #ede9fe; color: #6b21a8; }
  .filter-btn.all.active { background: #6b21a8; }
  .filter-btn.mush { background: #fef3c7; color: #b45309; }
  .filter-btn.mush.active { background: #b45309; color: white; }
  .filter-btn.flower { background: #fce7f3; color: #be185d; }
  .filter-btn.flower.active { background: #be185d; color: white; }
  .filter-btn.done { background: #dcfce7; color: #166534; }
  .filter-btn.done.active { background: #166534; color: white; }
  .filter-btn.undone { background: #fee2e2; color: #991b1b; }
  .filter-btn.undone.active { background: #991b1b; color: white; }

  .section-title { font-size: 15px; font-weight: bold; margin: 16px 0 8px; padding-left: 4px; }
  .section-title.mush { color: #b45309; }
  .section-title.flower { color: #be185d; }

  .card { background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: flex-start; gap: 12px; transition: opacity 0.2s; cursor: pointer; }
  .card.done-card { filter: grayscale(1); opacity: 0.6; user-select: text; -webkit-user-select: text; }
  .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); }

  .check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.2s; }
  .check.checked { background: #22c55e; border-color: #22c55e; color: white; font-size: 14px; }

  .info { flex: 1; }
  .name { font-size: 15px; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
  .name.done-text { text-decoration: line-through; color: #9ca3af; }
  .coord { font-size: 12px; color: #6366f1; font-family: monospace; margin-bottom: 4px; }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; background: #f3f4f6; color: #6b7280; border-radius: 6px; padding: 2px 8px; }
  .tag.country { background: #ede9fe; color: #6b21a8; }

  .map-btn { background: #6366f1; color: white; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; text-decoration: none; display: inline-block; margin-top: 2px; }
  .map-btn:hover { background: #4f46e5; }

  .add-area { background: white; border-radius: 14px; padding: 16px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .add-area h3 { font-size: 15px; color: #6b21a8; margin-bottom: 12px; }
  .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .add-grid input, .add-grid select { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 10px; font-size: 14px; width: 100%; }
  .add-grid label { font-size: 12px; color: #6b7280; display: block; margin-bottom: 4px; }
  .add-btn { margin-top: 12px; width: 100%; background: #6b21a8; color: white; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
  .add-btn:hover { background: #581c87; }

  .empty { text-align: center; padding: 40px; color: #d1d5db; font-size: 14px; }

  @media (max-width: 480px) {
    .add-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>🌸 皮可敏座標清單</h1>
<p class="subtitle">點擊卡片標記完成 · 資料自動儲存</p>

<div class="stats">
  <div class="stat mush"><div class="num" id="stat-mush">0</div><div class="lbl">🍄 菇點</div></div>
  <div class="stat flower"><div class="num" id="stat-flower">0</div><div class="lbl">🌹 花點</div></div>
  <div class="stat total"><div class="num" id="stat-done">0</div><div class="lbl">✅ 已完成</div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn all active" onclick="setFilter('all')">全部</button>
  <button class="filter-btn mush" onclick="setFilter('mush')">🍄 菇點</button>
  <button class="filter-btn flower" onclick="setFilter('flower')">🌹 花點</button>
  <button class="filter-btn undone" onclick="setFilter('undone')">未完成</button>
  <button class="filter-btn done" onclick="setFilter('done')">已完成</button>
</div>

<div id="list"></div>

<div class="add-area">
  <h3>➕ 新增座標</h3>
  <div class="add-grid">
    <div><label>名稱 / 備註</label><input id="in-name" placeholder="例：花夢里、奈良美智..." /></div>
    <div><label>類型</label>
      <select id="in-type">
        <option value="mush">🍄 菇點</option>
        <option value="flower">🌹 花點</option>
      </select>
    </div>
    <div><label>緯度</label><input id="in-lat" placeholder="例：34.641542" /></div>
    <div><label>經度</label><input id="in-lng" placeholder="例：132.922571" /></div>
    <div><label>國家 / 地區</label><input id="in-country" placeholder="例：日本、德國..." /></div>
    <div><label>標籤（空格分隔）</label><input id="in-tags" placeholder="例：藍莓 雪" /></div>
  </div>
  <button class="add-btn" onclick="addSpot()">新增</button>
</div>

<script>
const defaultSpots = [
  { id:1, type:"mush", name:"花夢里", lat:34.641542, lng:132.922571, country:"日本", tags:["世羅町上津田"], done:false },
  { id:2, type:"mush", name:"3/26 有盆", lat:61.2195278, lng:14.5391389, country:"瑞典", tags:["藍莓","雪"], done:false },
  { id:3, type:"mush", name:"奈良美智", lat:35.5208720, lng:127.7292260, country:"", tags:[], done:false },
  { id:4, type:"flower", name:"萊希瀑布", lat:47.561806, lng:10.694803, country:"德國", tags:[], done:false },
  { id:5, type:"flower", name:"", lat:47.5610188, lng:10.7387846, country:"", tags:[], done:false },
  { id:6, type:"flower", name:"北海道", lat:43.0328450, lng:141.3898160, country:"日本", tags:["北"], done:false },
];

let spots = [];
let filter = "all";
let nextId = 7;

function load() {
  try {
    const d = localStorage.getItem("pikmin_spots");
    spots = d ? JSON.parse(d) : defaultSpots;
    const n = localStorage.getItem("pikmin_nextid");
    nextId = n ? Number(n) : 7;
  } catch { spots = defaultSpots; }
}

function save() {
  localStorage.setItem("pikmin_spots", JSON.stringify(spots));
  localStorage.setItem("pikmin_nextid", String(nextId));
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  document.querySelector(".filter-btn." + (f==="all"?"all":f==="mush"?"mush":f==="flower"?"flower":f==="done"?"done":"undone")).classList.add("active");
  render();
}

function toggle(id) {
  spots = spots.map(s => s.id===id ? {...s, done:!s.done} : s);
  save(); render();
}

function addSpot() {
  const name = document.getElementById("in-name").value.trim();
  const type = document.getElementById("in-type").value;
  const lat = parseFloat(document.getElementById("in-lat").value);
  const lng = parseFloat(document.getElementById("in-lng").value);
  const country = document.getElementById("in-country").value.trim();
  const tagsRaw = document.getElementById("in-tags").value.trim();
  if (!lat || !lng) return alert("請填寫緯度和經度");
  const tags = tagsRaw ? tagsRaw.split(/\s+/) : [];
  spots.push({ id: nextId++, type, name, lat, lng, country, tags, done: false });
  save(); render();
  ["in-name","in-lat","in-lng","in-country","in-tags"].forEach(id => document.getElementById(id).value = "");
}

function render() {
  const mushSpots = spots.filter(s => s.type==="mush" && matchFilter(s));
  const flowerSpots = spots.filter(s => s.type==="flower" && matchFilter(s));

  // Stats
  document.getElementById("stat-mush").textContent = spots.filter(s=>s.type==="mush").length;
  document.getElementById("stat-flower").textContent = spots.filter(s=>s.type==="flower").length;
  document.getElementById("stat-done").textContent = spots.filter(s=>s.done).length;

  let html = "";

  if (filter==="all" || filter==="mush" || filter==="done" || filter==="undone") {
    if (mushSpots.length) {
      html += `<div class="section-title mush">🍄 菇點（${mushSpots.length}）</div>`;
      mushSpots.forEach(s => html += cardHTML(s));
    }
  }
  if (filter==="all" || filter==="flower" || filter==="done" || filter==="undone") {
    if (flowerSpots.length) {
      html += `<div class="section-title flower">🌹 花點（${flowerSpots.length}）</div>`;
      flowerSpots.forEach(s => html += cardHTML(s));
    }
  }
  if (!mushSpots.length && !flowerSpots.length) {
    html = `<div class="empty">沒有符合的座標</div>`;
  }

  document.getElementById("list").innerHTML = html;
}

function matchFilter(s) {
  if (filter==="done") return s.done;
  if (filter==="undone") return !s.done;
  if (filter==="mush") return s.type==="mush";
  if (filter==="flower") return s.type==="flower";
  return true;
}

function cardHTML(s) {
  const mapUrl = `https://maps.google.com/?q=${s.lat},${s.lng}`;
  const displayName = s.name || `${s.lat}, ${s.lng}`;
  const allTags = [...(s.country?[s.country]:[]), ...s.tags];
  return `
    <div class="card ${s.done?'done-card':''}" onclick="toggle(${s.id})">
      <div class="check ${s.done?'checked':''}">${s.done?'✓':''}</div>
      <div class="info">
        <div class="name ${s.done?'done-text':''}">${s.type==='mush'?'🍄':'🌹'} ${displayName}</div>
        <div class="coord">${s.lat}, ${s.lng}</div>
        ${allTags.length ? `<div class="tags">${allTags.map(t=>`<span class="tag ${t===s.country?'country':''}">${t}</span>`).join('')}</div>` : ''}
      </div>
      <a href="${mapUrl}" target="_blank" onclick="event.stopPropagation()" class="map-btn">地圖</a>
    </div>
  `;
}

load(); render();
</script>
</body>
</html>
